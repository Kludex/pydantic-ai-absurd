name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/pydantic-ai-absurd
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Build and check tag matches version
        run: |
          uv build
          built="$(ls dist/*.tar.gz | sed -E 's/.*pydantic_ai_absurd-(.*)\.tar\.gz/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          if [ "$built" != "$tag" ]; then
            echo "Tag $tag does not match built version $built" >&2
            exit 1
          fi

      - name: Publish to PyPI
        run: uv publish
